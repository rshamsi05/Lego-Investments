version: 2

sources:
  - name: lego_staging
    database: lego-investments
    schema: lego_staging
    description: "Raw data ingested from Rebrickable and Bricklink Scrapers"
    tables:
      - name: stg_prices
        description: "Historical price observation for LEgo ets scraped from Bricklink"
        columns: 
          - name: set_id
            tests:
              - not_null
          - name: observed_date
            tests:
              - not_null
      - name: stg_sets
        description: "Lego set metadata ingested from Rebrickable API"
        columns:
          - name: set_id
            tests:
              - unique
              - not_null
